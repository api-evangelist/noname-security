aid: noname-security
name: Noname Security
description: >-
  Noname Security (acquired by Akamai in 2024) is an API security platform that
  provides complete API discovery, posture management, runtime protection, and
  active testing capabilities. The platform helps organizations discover all
  APIs including shadow and rogue APIs, detect misconfigurations and
  vulnerabilities, and protect against API-based attacks across their entire API
  estate.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - API Discovery
  - API Security
  - API Testing
  - Posture Management
  - Runtime Protection
  - Shadow APIs
url: >-
  https://raw.githubusercontent.com/api-evangelist/noname-security/refs/heads/main/apis.yml
created: '2026-03-26'
modified: '2026-03-26'
specificationVersion: '0.19'
apis:
  - aid: noname-security:api-security-platform
    name: Noname API Security Platform
    description: >-
      The Noname API Security Platform provides comprehensive API security
      through discovery, posture management, runtime protection, and active
      testing. It discovers all APIs across the organization, detects
      misconfigurations, monitors for anomalous behavior and attacks, and
      enables pre-production API security testing.
    humanURL: https://nonamesecurity.com
    tags:
      - API Discovery
      - API Security
      - API Testing
      - Posture Management
      - Runtime Protection
    properties:
      - type: Documentation
        url: https://docs.nonamesecurity.com/
      - type: GettingStarted
        url: https://docs.nonamesecurity.com/docs/getting-started
  - aid: noname-security:api-discovery
    name: Noname API Discovery
    description: >-
      Noname API Discovery provides complete visibility into all APIs across an
      organization, including managed, unmanaged, shadow, and legacy APIs. It
      automatically catalogs APIs, classifies sensitive data, and identifies
      data types flowing through API traffic.
    humanURL: https://nonamesecurity.com/product/discovery
    tags:
      - API Discovery
      - API Inventory
      - Data Classification
      - Shadow APIs
    properties: []
  - aid: noname-security:runtime-protection
    name: Noname Runtime Protection
    description: >-
      Noname Runtime Protection uses AI and machine learning to detect and block
      API attacks in real time, including data leakage, policy violations,
      suspicious behavior, and targeted attacks on APIs.
    humanURL: https://nonamesecurity.com/product/protect
    tags:
      - API Security
      - Real-Time Monitoring
      - Runtime Protection
      - Threat Detection
    properties: []
  - aid: noname-security:active-testing
    name: Noname Active Testing
    description: >-
      Noname Active Testing enables organizations to test APIs for
      vulnerabilities and misconfigurations before they reach production,
      integrating into CI/CD pipelines for shift-left API security testing.
    humanURL: https://nonamesecurity.com/product/active-testing
    tags:
      - API Testing
      - CI/CD
      - Security Testing
      - Shift Left
    properties: []
